services:
  # FastAPI backend: RAG chatbot (/ask) + evaluation (/evaluate)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KB_PATH: /app/data/knowledge_base.json
    ports:
      - "8100:8000"

  # React chatbot UI (served by nginx). Backend URL baked in at build time.
  chatbot:
    build:
      context: ./chatbot-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://eu.i.posthog.com}
    ports:
      - "3100:80"
    depends_on:
      - backend

  # Streamlit evaluation dashboard (the original response-quality tool)
  evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run streamlit/streamlit.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_URL: http://backend:8000/evaluate
    depends_on:
      - backend
    ports:
      - "8601:8501"
